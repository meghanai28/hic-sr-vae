# Cross-cell-line generalization: evaluate GM12878-trained model on K562 test tiles.
# Only affects evaluate.py / reconstruct_chromosome.py; do not train with this config.

data:
  train_lr: tiles/lr/train/*.npy
  train_hr: tiles/hr/train/*.npy
  val_lr:   tiles/lr/val/*.npy
  val_hr:   tiles/hr/val/*.npy
  test_lr:  tiles_k562/lr/test/*.npy
  test_hr:  tiles_k562/hr/test/*.npy
  stats:    tiles_k562/hr/stats.json

vae:
  z_ch: 32
  base_ch: 32
  epochs: 50
  batch_size: 8
  lr: 0.0002
  save_dir: ./runs/paper_full

srvae:
  scale: 2

num_workers: 4
seed: 42
deterministic: true

loss:
  rec_w: 1.00
  ssim_w: 0.50
  grad_w: 0.25
  beta_start: 0.0
  beta_end: 0.0001
  kl_warmup_epochs: 10
  free_bits: 0.0
