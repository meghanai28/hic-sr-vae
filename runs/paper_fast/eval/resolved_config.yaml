data:
  train_lr: tiles/lr/train/*.npy
  train_hr: tiles/hr/train/*.npy
  val_lr: tiles/lr/val/*.npy
  val_hr: tiles/hr/val/*.npy
  test_lr: tiles/lr/test/*.npy
  test_hr: tiles/hr/test/*.npy
  stats: tiles/hr/stats.json
  train_limit: 2000
  val_limit: 400
  test_limit: 400
vae:
  z_ch: 32
  base_ch: 32
  epochs: 20
  batch_size: 8
  lr: 0.0002
  save_dir: ./runs/paper_fast
srvae:
  scale: 2
num_workers: 4
seed: 42
deterministic: true
loss:
  rec_w: 1.0
  ssim_w: 0.5
  grad_w: 0.25
  beta_start: 0.0
  beta_end: 0.0001
  kl_warmup_epochs: 5
  free_bits: 0.0
